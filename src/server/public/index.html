<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlowChain — Arbitrage Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#eef3f8; --bg2:#e4ecf4;
    --panel:#ffffff; --panel-soft:#f6f9fc; --panel-2:#eef4f9;
    --line:#e4ebf2; --line-soft:#eef2f6;
    --text:#0f2330; --text-2:#42586a; --dim:#7d93a4; --faint:#a7b8c6;
    --teal:#17b6c4; --teal-2:#0fa3b1; --teal-dim:#e2f6f8;
    --blue:#2f6bff; --indigo:#6d5bf6; --gold:#d9a022;
    --green:#15b87f; --green-dim:#e3f7ef; --red:#f0506b; --red-dim:#fdeaee;
    --amber:#f0a93b;
    --accent-grad:linear-gradient(135deg,#1bb9c7,#2f6bff);
    --shadow:0 1px 2px rgba(16,40,60,.04),0 6px 22px rgba(16,40,60,.06);
    --shadow-sm:0 1px 2px rgba(16,40,60,.05),0 2px 8px rgba(16,40,60,.04);
    --r:16px; --r-sm:12px;
  }
  [data-theme="dark"]{
    --bg:#070d14; --bg2:#0a121c;
    --panel:#0e1722; --panel-soft:#111c2a; --panel-2:#0c1521;
    --line:#1a2735; --line-soft:#16222f;
    --text:#e7f0f7; --text-2:#9fb3c4; --dim:#6c8092; --faint:#4a5d6e;
    --teal:#22d3e0; --teal-2:#19c2cf; --teal-dim:#0d2730;
    --green:#27d995; --green-dim:#0c2c22; --red:#ff5e7a; --red-dim:#2e1620;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.45);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1100px 520px at 88% -8%, color-mix(in srgb,var(--teal) 10%, transparent), transparent 60%),
      radial-gradient(900px 500px at -5% 105%, color-mix(in srgb,var(--blue) 8%, transparent), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text);
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:13px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  .pos{color:var(--green);} .neg{color:var(--red);}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--faint);}

  /* ---------- shell ---------- */
  .app{display:grid; grid-template-columns:248px 1fr; min-height:100vh;}
  .side{position:sticky; top:0; height:100vh; padding:18px 16px; display:flex; flex-direction:column;
    border-right:1px solid var(--line); background:color-mix(in srgb,var(--panel) 70%, transparent); backdrop-filter:blur(8px);}
  .logo{display:flex; align-items:center; gap:11px; padding:10px 6px 20px;}
  .logo .brand{height:38px; width:auto; max-width:100%; object-fit:contain;}
  [data-theme="dark"] .logo .brand{filter:drop-shadow(0 0 1px rgba(120,200,255,.3));}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
  .nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--text-2);
    text-decoration:none;font-weight:600;font-size:13.5px;cursor:pointer;transition:.14s;border:1px solid transparent;}
  .nav a svg{width:18px;height:18px;opacity:.8;flex:none;}
  .nav a:hover{background:var(--panel-soft);color:var(--text);}
  .nav a.on{background:var(--teal-dim);color:var(--teal-2);border-color:color-mix(in srgb,var(--teal) 22%,transparent);}
  .nav a.on svg{opacity:1;}
  .nav .badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--teal);color:#fff;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center;}
  .side-foot{margin-top:auto;display:flex;flex-direction:column;gap:12px;}
  .stratcard{border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:var(--panel);box-shadow:var(--shadow-sm);}
  .stratcard .tag{display:flex;align-items:center;gap:7px;font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);font-weight:700;}
  .stratcard .tit{font-weight:800;font-size:15px;margin:7px 0 11px;}
  .stratcard .kv{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:3px;}
  .stratcard .kv b{color:var(--text);font-weight:700;}
  .meter{height:6px;border-radius:6px;background:var(--panel-2);overflow:hidden;margin-top:4px;}
  .meter > i{display:block;height:100%;background:var(--accent-grad);border-radius:6px;transition:width .4s;}
  .pausebtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:13px;border:none;cursor:pointer;
    background:#0e1c28;color:#fff;font-family:inherit;font-weight:700;font-size:13px;transition:.15s;box-shadow:var(--shadow-sm);}
  .pausebtn:hover{transform:translateY(-1px);}
  .pausebtn.paused{background:var(--amber);color:#3a2700;}

  .main{min-width:0;padding:0 28px 60px;}
  .topbar{display:flex;align-items:center;gap:18px;padding:20px 2px 14px;position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(2px);}
  .hello h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.4px;}
  .hello p{margin:2px 0 0;color:var(--dim);font-size:12.5px;}
  .top-tools{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .search{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 13px;width:280px;color:var(--dim);box-shadow:var(--shadow-sm);}
  .search input{border:none;background:none;outline:none;font-family:inherit;font-size:12.5px;color:var(--text);width:100%;}
  .pill{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-weight:700;font-size:12px;box-shadow:var(--shadow-sm);white-space:nowrap;}
  .render{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:7px 13px;box-shadow:var(--shadow-sm);}
  .render .k{font-size:8.5px;letter-spacing:1.6px;color:var(--dim);text-transform:uppercase;font-weight:700;}
  .render .v{font-size:11.5px;font-weight:700;margin-top:1px;}
  .iconbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--panel);cursor:pointer;display:grid;place-items:center;color:var(--text-2);box-shadow:var(--shadow-sm);position:relative;transition:.14s;}
  .iconbtn:hover{color:var(--teal-2);border-color:color-mix(in srgb,var(--teal) 30%,transparent);}
  .iconbtn .nb{position:absolute;top:-5px;right:-5px;background:var(--teal);color:#fff;font-size:9px;font-weight:800;border-radius:20px;min-width:17px;height:17px;display:grid;place-items:center;padding:0 4px;}
  .user{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:6px 12px 6px 6px;box-shadow:var(--shadow-sm);}
  .user .av{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0e1c28,#244;);color:#fff;display:grid;place-items:center;font-weight:800;font-size:12px;background:#0e1c28;}
  .user .nm{font-weight:700;font-size:12.5px;line-height:1.1;}
  .user .rl{font-size:10px;color:var(--dim);}

  .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-dim);}
  .dot.live{animation:pulse 1.8s infinite;}
  .dot.off{background:var(--red);box-shadow:0 0 0 4px var(--red-dim);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* ---------- cards ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
  .pad{padding:18px 20px;}
  .ovl{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-2);font-weight:700;}
  .h{font-size:16px;font-weight:800;letter-spacing:-.3px;margin:3px 0 0;}
  .muted{color:var(--dim);font-size:11.5px;}
  .grid{display:grid;gap:16px;}
  .view{display:none;animation:fade .25s ease;}
  .view.on{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* hero */
  .hero{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:16px;}
  .hero-l{position:relative;overflow:hidden;background:
      radial-gradient(700px 300px at 100% 0%, color-mix(in srgb,var(--teal) 10%,transparent),transparent 60%),var(--panel);}
  .livechip{display:inline-flex;align-items:center;gap:7px;background:var(--teal-dim);color:var(--teal-2);font-weight:700;font-size:11px;border-radius:20px;padding:5px 12px;}
  .hero-l h2{font-size:30px;line-height:1.12;font-weight:800;letter-spacing:-.8px;margin:14px 0 10px;max-width:460px;}
  .hero-l p{color:var(--text-2);max-width:430px;font-size:13px;}
  .hero-chips{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
  .hchip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-weight:700;font-size:12px;background:var(--panel-soft);}
  .hero-r{position:relative;overflow:hidden;border-radius:var(--r);padding:22px 24px;color:#dff6fb;
    background:linear-gradient(135deg,#0c2230,#103a4a 55%,#0e2c3c);box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;min-height:210px;}
  .hero-r:after{content:"";position:absolute;inset:0;background:radial-gradient(320px 220px at 92% 16%,rgba(35,211,224,.28),transparent 62%);pointer-events:none;}
  .hero-art{position:absolute;right:-12px;top:50%;width:min(48%,245px);max-height:92%;transform:translateY(-50%);object-fit:contain;filter:drop-shadow(0 22px 32px rgba(0,0,0,.34));opacity:.9;z-index:0;}
  .hero-r h3,.hero-r p,.hero-r a{position:relative;z-index:1;}
  .hero-r h3{font-size:23px;font-weight:800;line-height:1.12;margin:0 0 8px;letter-spacing:-.4px;max-width:310px;}
  .hero-r p{font-size:12px;color:#9fc9d6;margin:0 0 16px;max-width:280px;}
  .hero-r a{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);color:#eafaff;border:1px solid rgba(255,255,255,.18);border-radius:11px;padding:10px 16px;font-weight:700;font-size:12px;text-decoration:none;backdrop-filter:blur(4px);transition:.15s;}
  .hero-r a:hover{background:rgba(255,255,255,.2);}

  /* kpi area */
  .kpiwrap{display:grid;grid-template-columns:minmax(0,1.12fr) minmax(420px,.88fr);gap:16px;margin-bottom:16px;align-items:stretch;}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .kpi{position:relative;overflow:hidden;padding:15px 16px;display:flex;flex-direction:column;justify-content:space-between;min-height:112px;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;}
  .kpi:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,color-mix(in srgb,var(--teal) 8%,transparent),transparent 46%);opacity:.85;pointer-events:none;}
  .kpi:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--teal) 30%,transparent);box-shadow:0 10px 28px rgba(16,40,60,.08);}
  .kpi .row,.kpi .v,.kpi .s{position:relative;z-index:1;}
  .kpi .row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .kpi .k{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);font-weight:800;}
  .kpi .ic{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--teal-dim),color-mix(in srgb,var(--blue) 9%,var(--panel)));color:var(--teal-2);display:grid;place-items:center;box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--teal) 18%,transparent),0 8px 18px color-mix(in srgb,var(--teal) 15%,transparent);}
  .kpi .ic svg{width:18px;height:18px;}
  .kpi .v{font-size:23px;font-weight:800;letter-spacing:-.6px;margin-top:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kpi .s{font-size:11px;color:var(--dim);margin-top:4px;}
  .pnlcard{position:relative;overflow:hidden;padding:16px 18px;display:grid;grid-template-columns:minmax(220px,.9fr) minmax(260px,1.1fr);gap:16px;align-items:stretch;}
  .pnlcard:before{content:"";position:absolute;inset:0;background:radial-gradient(440px 220px at 0% 0%,color-mix(in srgb,var(--teal) 10%,transparent),transparent 62%);pointer-events:none;}
  .pnl-main,.pnl-viz{position:relative;z-index:1;}
  .pnl-main{display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
  .pnlcard .big{display:block;font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1;margin-top:7px;}
  .delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:800;border-radius:20px;padding:3px 10px;background:var(--green-dim);color:var(--green);margin-top:10px;vertical-align:middle;width:max-content;}
  .delta.neg{background:var(--red-dim);color:var(--red);}
  .ministats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-top:14px;}
  .mini{border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:color-mix(in srgb,var(--panel-soft) 72%,transparent);box-shadow:var(--shadow-sm);}
  .mini .k{font-size:9.5px;color:var(--dim);font-weight:700;white-space:nowrap;}
  .mini .v{font-size:16px;font-weight:800;margin-top:3px;}
  .pnl-viz{border:1px solid var(--line-soft);border-radius:14px;background:linear-gradient(180deg,var(--panel-soft),color-mix(in srgb,var(--panel) 82%,transparent));padding:12px;display:flex;min-height:150px;}
  .chartbox{flex:1;min-height:126px;position:relative;}
  .pnl-empty{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:9px;flex:1;min-height:126px;padding:8px 16px;color:var(--dim);}
  .pnl-empty svg{width:30px;height:30px;opacity:.5;}
  .pnl-empty div{font-size:12px;max-width:300px;line-height:1.45;}
  .pnlcard.empty .chartbox{display:none;}
  .pnlcard.empty .pnl-empty{display:flex;}
  canvas{display:block;width:100%;height:100%;}

  /* exchange price cards */
  .exrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .excard{border:1px solid var(--line);border-radius:13px;padding:13px 15px;background:var(--panel-soft);transition:.15s;}
  .excard.inactive{opacity:.42;filter:grayscale(.5);}
  .excard:hover{border-color:color-mix(in srgb,var(--teal) 28%,transparent);box-shadow:var(--shadow-sm);}
  .excard .top{display:flex;align-items:center;gap:10px;}
  .exlogo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:13px;}
  .excard .en{font-weight:800;font-size:14px;}
  .excard .et{font-size:10.5px;color:var(--dim);}
  .livedot{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;color:var(--green);}
  .excard .price{font-size:23px;font-weight:800;letter-spacing:-.6px;margin:11px 0 9px;}
  .excard .ba{display:flex;justify-content:space-between;font-size:11px;}
  .excard .ba .lab{color:var(--dim);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .excard .ba .vv{font-weight:700;margin-top:1px;}
  .pbar{height:5px;border-radius:5px;background:var(--panel-2);overflow:hidden;margin:10px 0;}
  .pbar > i{display:block;height:100%;background:var(--accent-grad);border-radius:5px;transition:width .3s;}

  /* tables */
  table{width:100%;border-collapse:collapse;}
  thead th{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);font-weight:700;text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);}
  thead th.r,tbody td.r{text-align:right;}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line-soft);font-size:12.5px;font-weight:600;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel-soft);}
  .exbadge{display:inline-flex;align-items:center;gap:7px;font-weight:700;}
  .exdot{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;}
  .arrow{color:var(--faint);}
  .stbadge{font-size:10.5px;font-weight:700;border-radius:8px;padding:3px 9px;display:inline-block;}
  .st-exec{background:var(--green-dim);color:var(--green);}
  .st-rej{background:#fef3e2;color:var(--amber);}
  [data-theme="dark"] .st-rej{background:#2d2210;}
  .st-ghost{background:color-mix(in srgb,var(--indigo) 16%,transparent);color:var(--indigo);}
  .st-filled{background:var(--green-dim);color:var(--green);}
  .st-partial{background:#fef3e2;color:var(--amber);}
  [data-theme="dark"] .st-partial{background:#2d2210;}
  .empty{padding:34px;text-align:center;color:var(--dim);font-size:12.5px;}
  .btnlink{display:inline-flex;align-items:center;gap:6px;background:var(--panel-soft);border:1px solid var(--line);border-radius:10px;padding:7px 13px;font-weight:700;font-size:11.5px;color:var(--text-2);cursor:pointer;text-decoration:none;transition:.14s;}
  .btnlink:hover{color:var(--teal-2);border-color:color-mix(in srgb,var(--teal) 28%,transparent);}

  /* comparison + scanner row */
  .cmpwrap{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:16px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 10px;}
  .legend span{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--text-2);}
  .legend i{width:10px;height:10px;border-radius:3px;}
  .tabs{display:flex;gap:4px;background:var(--panel-2);border-radius:10px;padding:3px;}
  .tabs button{border:none;background:none;font-family:inherit;font-weight:700;font-size:11px;color:var(--dim);padding:5px 11px;border-radius:7px;cursor:pointer;transition:.12s;}
  .tabs button.on{background:var(--panel);color:var(--text);box-shadow:var(--shadow-sm);}
  select{font-family:inherit;font-weight:700;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:var(--panel);color:var(--text);cursor:pointer;}

  /* bottom row */
  .row3{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-top:16px;}
  .row4{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:16px;margin-top:16px;}
  .donutwrap{display:flex;flex-direction:column;align-items:center;}
  .donut{position:relative;width:190px;height:190px;}
  .donut canvas{position:absolute;inset:0;display:block;width:190px;height:190px;}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .donut .ctr .l{font-size:10px;color:var(--dim);font-weight:600;line-height:1.2;}
  .donut .ctr .v{font-size:21px;font-weight:800;letter-spacing:-.5px;line-height:1.15;}
  .balleg{width:100%;margin-top:14px;display:flex;flex-direction:column;gap:9px;}
  .balrow{display:flex;align-items:center;gap:10px;font-size:12.5px;}
  .balrow i{width:11px;height:11px;border-radius:3px;flex:none;}
  .balrow .nm{font-weight:700;}
  .balrow .amt{margin-left:auto;font-weight:800;}
  .balrow .pc{color:var(--dim);font-weight:700;width:38px;text-align:right;}

  .riskgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .rcell{border:1px solid var(--line);border-radius:12px;padding:13px;}
  .rcell .k{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);font-weight:700;display:flex;align-items:center;gap:6px;}
  .rcell .v{font-size:22px;font-weight:800;margin-top:7px;letter-spacing:-.5px;}
  .rcell .s{font-size:10.5px;color:var(--dim);margin-top:3px;display:flex;align-items:center;gap:5px;}
  .rcell .s .d{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .rsplit{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
  .rsoft{background:var(--teal-dim);border-radius:12px;padding:13px;}
  .rsoft .k{font-size:11px;color:var(--text-2);font-weight:600;}
  .rsoft .v{font-size:20px;font-weight:800;margin-top:3px;}

  .costline{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:5px;margin-top:11px;}

<script>
"use strict";
/* ArbiCore dashboard — vanilla JS, zero libs. Built for data speed:
   SSE frames are stored, price buffers updated on arrival, but the DOM is
   re-rendered only for the ACTIVE view, batched on requestAnimationFrame. */

/* ---------- helpers ---------- */
const $ = (id) => document.getElementById(id);
const usd = (n, d = 2) => "$" + (Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
const usdc = (n) => { const v = Number(n) || 0; const a = Math.abs(v); const f = a >= 1e6 ? (a / 1e6).toFixed(2) + "M" : a >= 1e3 ? (a / 1e3).toFixed(1) + "K" : a.toFixed(0); return (v < 0 ? "-$" : "$") + f; };
const pct = (n) => ((Number(n) || 0) * 100).toFixed(2) + "%";
const cls = (n) => (n > 0 ? "pos" : n < 0 ? "neg" : "");
const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);

/* exchange visual identity (color + short label) */
const EX = {
  binance: { c: "#d9a022", n: "Binance" }, kraken: { c: "#6d5bf6", n: "Kraken" },
  okx: { c: "#1b2530", n: "OKX" }, coinbase: { c: "#2f6bff", n: "Coinbase" },
  bitfinex: { c: "#15b87f", n: "Bitfinex" }, kucoin: { c: "#23c08a", n: "KuCoin" },
  gate: { c: "#e0457b", n: "Gate.io" }, bitstamp: { c: "#3a8f4f", n: "Bitstamp" },
  gemini: { c: "#16b3c4", n: "Gemini" }, bybit: { c: "#f0a93b", n: "Bybit" },
};
const exMeta = (id) => EX[id] || { c: "#7d93a4", n: cap(id) };
// Returns a predicate (id)=>bool for whether an exchange is active. null activeExchanges = all on.
function activeSet(s) {
  const act = s && s.activeExchanges;
  if (!act) return () => true;
  const set = new Set(act);
  return (id) => set.has(id);
}

$("themeBtn").onclick = () => {

  ["resumen", "Resumen"], ["oportunidades", "Oportunidades"], ["operaciones", "Operaciones"],
  ["exchanges", "Exchanges"], ["riesgo", "Riesgo"], ["estrategias", "Estrategias"],
  ["backtesting", "Backtesting"], ["alertas", "Alertas"], ["configuracion", "Configuración"],
];
let activeView = PREF.view && NAV.some((n) => n[0] === PREF.view) ? PREF.view : "resumen";

$("nav").innerHTML = NAV.map(([id, label]) =>
  `<a data-v="${id}" class="${id === activeView ? "on" : ""}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[id]}</svg>${label}${id === "oportunidades" ? '<span class="badge" id="navOppBadge">0</span>' : ""}${id === "alertas" ? '<span class="badge" id="navAlertBadge">0</span>' : ""}</a>`

});

function ensureSkeleton(v) {
  if (VHTML[v]) return;

function exchangeCard(b, mark) {

/* ---------- state + render loop ---------- */
let latest = null, dirty = false, forced = false;
let lastReal = null; // last frame with real numbers (for delta)
let msgCount = 0, upsTimer = Date.now(), upsVal = 0;
let renderMs = 0;
const PRICE = {};         // exchange -> array of {t, mid}
const PRICE_MAX = 3700;   // ~enough for 1H at ~1pt/sec
let timeframe = PREF.tf || 300;

function markDirty(force) { dirty = true; if (force) forced = true; }

function ingest(s) {
  latest = s;
  if (s.stats && s.stats.tradesExecuted >= 0) lastReal = s;
  // update per-exchange price buffers (cheap, runs on every frame)
  const now = s.ts || Date.now();
  (s.books || []).forEach((b) => {
    const mid = (b.bestBid + b.bestAsk) / 2 || b.bestAsk || b.bestBid;
    if (!mid) return;
    (PRICE[b.exchange] = PRICE[b.exchange] || []).push({ t: now, mid });
    if (PRICE[b.exchange].length > PRICE_MAX) PRICE[b.exchange].shift();
  });
  msgCount++;
  markDirty();
}

/* throttled rAF render — only the active view touches the DOM */
function loop() {
  // ups counter (updates/sec from the stream)
  const dt = Date.now() - upsTimer;
  if (dt >= 1000) { upsVal = Math.round((msgCount * 1000) / dt); msgCount = 0; upsTimer = Date.now(); }

  if (latest && (dirty || forced)) {
    const t0 = performance.now();
    try { renderTop(latest); renderActive(latest); } catch (e) { /* keep stream alive */ }
    renderMs = renderMs * 0.8 + (performance.now() - t0) * 0.2;
    dirty = false; forced = false;
  }
  requestAnimationFrame(loop);
}

function triCandidates(s) {
  return ((s.triangular && s.triangular.candidates) || []);
}
function triExecutableCount(s) { return triCandidates(s).filter((c) => c.executable).length; }
function statusBadge(status, executable) {
  if (executable) return `<span class="stbadge st-exec">Ejecutable</span>`;
  const ghost = ["Sin pares suficientes", "Sin profundidad suficiente", "Endpoint bloqueado", "Par no disponible", "Sin order book todavía", "Esperando WebSocket"].includes(status);
  return `<span class="stbadge ${ghost ? "st-ghost" : "st-rej"}">${esc(status || "En espera")}</span>`;
}
function triScannerRows(s, limit) {
  const rows = triCandidates(s).slice(0, limit || 999).map((c) => {
    const detail = c.reasons && c.reasons.length ? c.reasons : (c.missingPairs || []).map((p) => `${p}: Sin order book todavía`);
    const miss = detail.length ? `<br><span class="muted" style="font-size:10.5px">${esc(detail.join(" · "))}</span>` : "";
    return `<tr><td><b>${esc(c.coin)}</b>${miss}</td><td>${esc(c.path)}</td><td class="r num ${cls(c.netProfitPct)}">${pct(c.netProfitPct)}</td><td class="r num">${usd(c.feeCostUSDT || 0)}</td><td class="r">${statusBadge(c.status, c.executable)}</td></tr>`;
  }).join("");
  return rows || `<tr><td colspan="5" class="empty">Sin rutas candidatas todavía. Revisa pares COIN/BTC y COIN/USDT para el exchange seleccionado.</td></tr>`;
}
function renderTop(s) {
  const connected = !!es && es.readyState === 1;
  $("engineDot").className = "dot " + (s.paused ? "off" : "live");
  $("engineLbl").textContent = s.paused ? "Motor en pausa" : "Motor activo";
  $("renderMs").textContent = renderMs.toFixed(1);
  $("ups").textContent = upsVal;
  // sidebar strategy card
  const cap = s.portfolio ? s.portfolio.totalValueQuote : 0;
  const baseVal = (s.portfolio ? s.portfolio.totalBase : 0) * (s.markPrice || 0);
  const usePct = cap ? Math.min(100, (baseVal / cap) * 100) : 0;
  $("stratName").textContent = s.strategy
    ? (isTriActive(s) ? `Triangular · ${exMeta((s.triangular || {}).exchange || "").n}` : (STRAT_LABELS[s.strategy.effective] || "Cross-Exchange"))
    : "Cross-Exchange BTC";
  $("stratCap").textContent = usdc(cap);
  $("stratUsePct").textContent = usePct.toFixed(1) + "%";
  $("stratMeter").style.width = usePct + "%";
  // pause button
  $("pauseBtn").classList.toggle("paused", !!s.paused);
  $("pauseIcon").textContent = s.paused ? "▶" : "❚❚";
  $("pauseLbl").textContent = s.paused ? "Reanudar motor" : "Pausar motor";
  // nav badges
  const oppExec = isTriActive(s) ? triExecutableCount(s) : (s.opportunities || []).filter((o) => o.executable).length;
  setText("navOppBadge", oppExec);
  const alerts = computeAlerts(s);
  setText("navAlertBadge", alerts.length);
  setText("alertNb", alerts.length);
}
function cap0(s){return s? s.charAt(0).toUpperCase()+s.slice(1):s;}
function setText(id, v) { const e = $(id); if (e) e.textContent = String(v); }

function renderActive(s) {

}

  });
  $("view-resumen").querySelectorAll("#tfTabs button").forEach((b) => {
    b.onclick = () => { timeframe = Number(b.dataset.tf); PREF.tf = timeframe; savePrefs();
      $("tfTabs").querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b)); markDirty(true); };

}
function renderResumen(s) {

  dEl.className = "delta " + (deltaPct < 0 ? "neg" : "");
  setText("mTrades", st.tradesExecuted || 0);

  drawPnl($("pnlChart"), s.pnlHistory || [], false);
  const riskLvl = s.risk && s.risk.breakerActive ? "Alto" : (s.risk && s.risk.drawdown > 0 ? "Medio" : "Bajo");

  // KPIs (deduplicated — Portfolio value carries the capital-in-use as subtext)

  const baseVal = (s.portfolio ? s.portfolio.totalBase : 0) * (s.markPrice || 0);
  const usePct = s.portfolio && s.portfolio.totalValueQuote ? (baseVal / s.portfolio.totalValueQuote) * 100 : 0;
  setText("kPortSub", usePct.toFixed(1) + "%");
  const tri = isTriActive(s);
  const execNow = tri ? triExecutableCount(s) : (s.opportunities || []).filter((o) => o.executable).length;
  setText("kOpp", tri ? triCandidates(s).length : (s.opportunities || []).length);

  const actSet = activeSet(s);

function renderBalances(s) {

function renderRiskMini(s) {
  const r = s.risk || {};
  setText("rLatAvg", (s.avgLatencyMs || 0).toFixed(0) + " ms");
  setText("rLatNow", (s.bookAgeMs || 0).toFixed(1) + " ms");

  const st = s.stats || {};
  const slipPct = st.grossProfit ? (st.slippageCost / st.grossProfit) : 0;

function rejectedCount(s){ return (s.opportunities||[]).filter(o=>!o.executable).length; }
function netExposure(s){ if(!s.portfolio) return 0; return Math.abs(s.portfolio.totalBase*(s.markPrice||0) - s.portfolio.totalQuote); }

function renderCost(s) {
  const st = s.stats || {};
  if (!st.tradesExecuted) { $("costBox").innerHTML = `<div class="empty" style="padding:18px">Sin operaciones aún.</div>`; $("costNet").textContent = usd(0); return; }
  const gross = st.grossProfit || 0;
  const max = Math.max(gross, st.tradingFees, st.slippageCost, st.latencyPenalty, 1);
  const bar = (k, v, sign, green) => `<div class="costline"><span class="k">${k}</span><span class="${sign}">${v < 0 ? "-" : sign === "pos" ? "+" : ""}${usd(Math.abs(v))}</span></div><div class="costbar ${green ? "g" : ""}"><i style="width:${Math.min(100, (Math.abs(v) / max) * 100)}%"></i></div>`;
  $("costBox").innerHTML =
    bar("Gross profit", gross, "pos", true) +
    bar("Trading fees", -st.tradingFees, "neg") +
    bar("Slippage", -st.slippageCost, "neg") +
    bar("Latency penalty", -st.latencyPenalty, "neg");
  $("costNet").textContent = usd(st.realizedPnl || 0);
  $("costNet").className = "v num " + cls(st.realizedPnl);
}

function renderHealth(s) {

/* exchange enable/disable toggles — selection persisted server-side.
   Cross-Exchange: multi-select (several venues active). Triangular: single-select
   (exactly one venue; selecting one deselects the rest). The two states are kept
   completely independent — cross uses the `exchanges` command + activeExchanges,
   triangular uses the `tri-exchange` command + triangular.exchange. */
let _exToggleBuilt = false;
let _exToggleMode = null;     // "cross" | "tri" — force rebuild when the mode flips
let _exPending = null;       // the cross selection we last sent; null once server confirms it
let _exPendingAt = 0;        // when we sent it
let _triExPending = null;    // the triangular venue we last clicked
let _triExPendingAt = 0;
function ctl(cmd, value) {
  const u = "/control?cmd=" + cmd + (value !== undefined ? "&value=" + encodeURIComponent(value) : "");
  fetch(u).catch(() => {});
}
// normalize an active-list (null = all) into a comparable sorted CSV
function _normActive(active, connected) {
  if (!active) return connected.slice().sort().join(",");
  return active.slice().sort().join(",");
}
function renderExchangeToggles(s, tri) {
  const connected = (s.exchanges && s.exchanges.length ? s.exchanges : (s.books || []).map((b) => b.exchange));
  const wrap = $("exToggles");
  if (!wrap) return;
  const mode = tri ? "tri" : "cross";

  // Update the helper copy + bulk buttons + section heading per mode.
  const help = $("exHelp"), bulk = $("exBulk");
  if (help) help.innerHTML = tri
    ? "Estrategia <b>Triangular</b>: la triangulación ocurre dentro de <b>un único exchange</b>. Activa uno y los demás se desactivan automáticamente. La selección se guarda en el servidor."
    : "Elige en qué venues opera el motor. Los desactivados siguen recibiendo datos pero se excluyen de la detección. La selección se guarda en el servidor, así que persiste entre reinicios y entre navegadores.";
  if (bulk) bulk.style.display = tri ? "none" : "flex";

  // Rebuild the toggle DOM when first built, when the venue count changes, or
  // when the strategy mode flips (multi-select <-> single-select).
  if (!_exToggleBuilt || _exToggleMode !== mode || wrap.children.length !== connected.length) {
    if (tri) {
      const sel = s.triangular && s.triangular.exchange;
      wrap.innerHTML = connected.map((id) => {
        const m = exMeta(id);
        const on = id === sel;
        return `<div class="extog single ${on ? "on" : "off"}" data-ex="${id}"><div class="exlogo" style="background:${m.c}">${m.n[0]}</div><div class="nm">${m.n}</div><div class="sw"></div></div>`;
      }).join("");
      wrap.querySelectorAll(".extog").forEach((el) => {
        el.onclick = () => {
          // Single-select: turn this one on, all others off, then tell the server.
          wrap.querySelectorAll(".extog").forEach((x) => { x.classList.remove("on"); x.classList.add("off"); });
          el.classList.add("on"); el.classList.remove("off");
          _triExPending = el.dataset.ex; _triExPendingAt = Date.now();
          ctl("tri-exchange", el.dataset.ex);
        };
      });
    } else {
      const serverActive = s.activeExchanges;
      const isOn = (id) => !serverActive || serverActive.includes(id);
      wrap.innerHTML = connected.map((id) => {
        const m = exMeta(id);
        return `<div class="extog ${isOn(id) ? "on" : "off"}" data-ex="${id}"><div class="exlogo" style="background:${m.c}">${m.n[0]}</div><div class="nm">${m.n}</div><div class="sw"></div></div>`;
      }).join("");
      wrap.querySelectorAll(".extog").forEach((el) => {
        el.onclick = () => {
          el.classList.toggle("on"); el.classList.toggle("off");
          const chosen = [...wrap.querySelectorAll(".extog.on")].map((x) => x.dataset.ex);
          _exPending = chosen.slice().sort().join(",");
          _exPendingAt = Date.now();
          ctl("exchanges", chosen.length === connected.length ? "" : (chosen.length ? chosen.join(",") : "__none__"));
        };
      });
      const all = $("exAll"), none = $("exNone");
      if (all) all.onclick = () => { wrap.querySelectorAll(".extog").forEach((x) => { x.classList.add("on"); x.classList.remove("off"); }); _exPending = connected.slice().sort().join(","); _exPendingAt = Date.now(); ctl("exchanges", ""); };
      if (none) none.onclick = () => { wrap.querySelectorAll(".extog").forEach((x) => { x.classList.remove("on"); x.classList.add("off"); }); _exPending = ""; _exPendingAt = Date.now(); ctl("exchanges", "__none__"); };
    }
    _exToggleBuilt = true;
    _exToggleMode = mode;
    return;
  }

  // Sync from server frames, respecting any in-flight user intent.
  if (tri) {
    const sel = s.triangular && s.triangular.exchange;
    const inFlight = _triExPending !== null && (Date.now() - _triExPendingAt) < 4000;
    if (inFlight && _triExPending === sel) _triExPending = null;
    if (!inFlight) {
      _triExPending = null;
      wrap.querySelectorAll(".extog").forEach((el) => {
        const on = el.dataset.ex === sel;
        el.classList.toggle("on", on); el.classList.toggle("off", !on);
      });
    }
  } else {
    const serverActive = s.activeExchanges;
    const serverNorm = _normActive(serverActive, connected);
    const isOn = (id) => !serverActive || serverActive.includes(id);
    if (_exPending !== null && _exPending === serverNorm) _exPending = null;
    const inFlight = _exPending !== null && (Date.now() - _exPendingAt) < 4000;
    if (!inFlight) {
      _exPending = null;
      wrap.querySelectorAll(".extog").forEach((el) => {
        const on = isOn(el.dataset.ex);
        el.classList.toggle("on", on); el.classList.toggle("off", !on);
      });
    }
  }
}

/* triangular candidate-coin panel — toggles persisted server-side via tri-coins */
let _triCoinPending = null;
let _triCoinPendingAt = 0;
function renderTriCoins(s, tri) {
  const card = $("triCoinCard");
  if (!card) return;
  card.style.display = tri ? "block" : "none";
  if (!tri) return;
  const t = s.triangular || {};
  const base = t.baseCoins || ["BTC", "USDT"];
  const available = t.availableCoins || [];
  const active = new Set(t.activeCoins || []);
  setText("triCoinEx", t.exchange ? exMeta(t.exchange).n : "—");

  // The full list to render: mandatory base coins first (locked on), then the
  // candidate coins. BTC/USDT are always shown as locked-active anchors.
  const grid = $("triCoinGrid");
  if (!grid) return;
  const baseRows = base.map((c) => {
    const desc = COIN_DESC[c] || c;
    return `<div class="cointog locked on" data-coin="${c}" data-locked="1"><div class="cn">${c[0]}</div><div class="cm"><b>${c}</b><span>${desc}</span></div><span class="lockpill">Base</span><div class="sw"></div></div>`;
  });
  const candRows = available.filter((c) => !base.includes(c)).map((c) => {
    const on = active.has(c);
    const desc = COIN_DESC[c] || c;
    return `<div class="cointog ${on ? "on" : "off"}" data-coin="${c}"><div class="cn">${c[0]}</div><div class="cm"><b>${c}</b><span>${desc}</span></div><div class="sw"></div></div>`;
  });
  const html = baseRows.concat(candRows).join("");

  // Confirm pending once the server's active set matches what we sent.
  const serverNorm = [...active].sort().join(",");
  if (_triCoinPending !== null && _triCoinPending === serverNorm) _triCoinPending = null;
  const inFlight = _triCoinPending !== null && (Date.now() - _triCoinPendingAt) < 4000;

  // Rebuild DOM only when the set of rows changes (cheap + keeps clicks responsive).
  const sig = base.concat(available).join("|");
  if (grid.dataset.sig !== sig) {
    grid.innerHTML = html;
    grid.dataset.sig = sig;
    grid.querySelectorAll(".cointog").forEach((el) => {
      if (el.dataset.locked) return; // base coins can't be toggled
      el.onclick = () => {
        el.classList.toggle("on"); el.classList.toggle("off");
        const chosen = [...grid.querySelectorAll(".cointog.on")]
          .map((x) => x.dataset.coin)
          .filter((c) => !base.includes(c));
        _triCoinPending = chosen.slice().sort().join(",");
        _triCoinPendingAt = Date.now();
        ctl("tri-coins", chosen.join(","));
      };
    });
  } else if (!inFlight) {
    // Sync visual state from server (only when no user change is in flight).
    grid.querySelectorAll(".cointog").forEach((el) => {
      if (el.dataset.locked) return;
      const on = active.has(el.dataset.coin);
      el.classList.toggle("on", on); el.classList.toggle("off", !on);
    });
  }
}

function computeAlerts(s) {

  if (s.risk && s.risk.breakerActive) out.push({ t: "Circuit breaker disparado", s: s.risk.tripReason || "Riesgo elevado", k: "err", time: "ahora" });
  if ((s.bookAgeMs || 0) > 2500) out.push({ t: "Latencia de feed elevada", s: (s.bookAgeMs || 0) + " ms de antigüedad", k: "warn", time: "ahora" });

    t: "Cambio de estrategia", s: `${(STRAT_LABELS[e.from] || e.from)} → ${(STRAT_LABELS[e.to] || e.to)}: ${e.reason}`,
    k: "switch", time: new Date(e.ts).toLocaleTimeString("es-ES"),
  }));
  (s.opportunities || []).filter((o) => o.executable).slice(0, 3).forEach((o) =>
    out.push({ t: "Oportunidad ejecutable", s: `${exMeta(o.buyExchange).n} → ${exMeta(o.sellExchange).n} · ${pct(o.netProfitPct)}`, k: "ok", time: "live" }));
  return out;

/* ---------- canvas charts (no libs) ---------- */
function fit(c) { const dpr = window.devicePixelRatio || 1; const w = c.clientWidth, h = c.clientHeight; if (c.width !== w * dpr || c.height !== h * dpr) { c.width = w * dpr; c.height = h * dpr; } const ctx = c.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0); return { ctx, w, h }; }

function drawPnl(c, hist, big) {
  if (!c) return; const { ctx, w, h } = fit(c); ctx.clearRect(0, 0, w, h);
  if (!hist || hist.length < 2) return;
  const ys = hist.map((p) => p.pnl); const min = Math.min(0, ...ys), max = Math.max(1, ...ys); const pad = big ? 14 : 6;
  const x = (i) => pad + (i / (hist.length - 1)) * (w - 2 * pad);
  const y = (v) => h - pad - ((v - min) / (max - min || 1)) * (h - 2 * pad);

function drawTriChart(c, candidates) {

/* ---------- SSE connection ---------- */
let es = null;
function connect() {
  es = new EventSource("/stream");
  es.onmessage = (e) => { try { ingest(JSON.parse(e.data)); } catch {} };
  es.onerror = () => { markDirty(true); };
}

/* ---------- pause control ---------- */
$("pauseBtn").onclick = async () => { try { await fetch("/control?cmd=toggle"); } catch {} };

/* ---------- global search (filters exchange cards) ---------- */
$("searchInput").addEventListener("input", () => markDirty(true));

/* ---------- boot ---------- */
ensureSkeleton(activeView);
connect();
requestAnimationFrame(loop);
window.addEventListener("resize", () => markDirty(true));
</script>
